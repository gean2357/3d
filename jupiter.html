<!DOCTYPE html>
<html>
<head>
  <title>Júpiter Interativo - VTX Mode</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
    #camera-container {
      position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
      border: 2px solid #00ffff; border-radius: 10px; overflow: hidden; z-index: 10; background: #000;
    }
    #webcam { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
    #hand-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; transform: scaleX(-1); }
    #info {
      position: absolute; top: 20px; width: 100%; text-align: center; color: #fff;
      font-size: 18px; letter-spacing: 2px; text-shadow: 0 0 10px #00ffff; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">MÃO ABERTA: ESPALHAR | FECHADA: PLANETA | 👍 : VTX 3D</div>
  
  <div id="camera-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="hand-canvas"></canvas>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    // --- CENA E RENDERER ---
    const scene = new THREE.Scene();
    const cameraView = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- CRIAÇÃO DO JÚPITER (PARTÍCULAS) ---
    const particlesGeometry = new THREE.BufferGeometry();
    const count = 10000;
    const positions = new Float32Array(count * 3);
    const originalPositions = new Float32Array(count * 3);

    for(let i = 0; i < count * 3; i+=3) {
        let phi = Math.acos(-1 + (2 * i/3) / count);
        let theta = Math.sqrt(count * Math.PI) * phi;
        positions[i] = 2.5 * Math.cos(theta) * Math.sin(phi);
        positions[i+1] = 2.5 * Math.sin(theta) * Math.sin(phi);
        positions[i+2] = 2.5 * Math.cos(phi);
        originalPositions[i] = positions[i]; originalPositions[i+1] = positions[i+1]; originalPositions[i+2] = positions[i+2];
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const points = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ size: 0.015, color: 0xffaa44 }));
    scene.add(points);
    cameraView.position.z = 6;

    // --- CRIAÇÃO DO TEXTO VTX 3D ---
    let textMesh;
    const loader = new THREE.FontLoader();
    // Carregando fonte padrão do Three.js via CDN
    loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', function (font) {
        const textGeo = new THREE.TextGeometry('VTX', {
            font: font, size: 1, height: 0.3, curveSegments: 12,
            bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.02,
        });
        textGeo.center();
        const textMat = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0xffffff });
        textMesh = new THREE.Mesh(textGeo, textMat);
        textMesh.position.set(0, 0, 2);
        textMesh.visible = false; // Começa invisível
        scene.add(textMesh);
        
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
    });

    // --- LÓGICA DE GESTOS ---
    const videoElement = document.getElementById('webcam');
    const handCanvas = document.getElementById('hand-canvas');
    const handCtx = handCanvas.getContext('2d');
    let explosionFactor = 0;

    function onResults(results) {
      handCanvas.width = videoElement.videoWidth;
      handCanvas.height = videoElement.videoHeight;
      handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});

        // 1. Lógica Explosão (Abrir/Fechar)
        const dist = Math.sqrt(Math.pow(landmarks[8].x - landmarks[4].x, 2) + Math.pow(landmarks[8].y - landmarks[4].y, 2));
        explosionFactor = dist > 0.15 ? (dist * 10) : 0;

        // 2. Lógica Gesto "Legal" (Thumb Up)
        // Polegar para cima (ponta acima da base) e outros dedos fechados
        const isThumbUp = landmarks[4].y < landmarks[3].y && 
                          landmarks[8].y > landmarks[6].y && 
                          landmarks[12].y > landmarks[10].y;

        if (textMesh) {
            textMesh.visible = isThumbUp;
            textMesh.rotation.y += 0.05; // Gira enquanto aparece
        }
      } else if (textMesh) {
          textMesh.visible = false;
      }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
    hands.onResults(onResults);

    new Camera(videoElement, {
      onFrame: async () => { await hands.send({image: videoElement}); },
      width: 640, height: 480
    }).start();

    function animate() {
      requestAnimationFrame(animate);
      const posArr = particlesGeometry.attributes.position.array;
      for(let i = 0; i < count * 3; i+=3) {
        posArr[i] += (originalPositions[i] * (1 + explosionFactor) - posArr[i]) * 0.1;
        posArr[i+1] += (originalPositions[i+1] * (1 + explosionFactor) - posArr[i+1]) * 0.1;
        posArr[i+2] += (originalPositions[i+2] * (1 + explosionFactor) - posArr[i+2]) * 0.1;
      }
      particlesGeometry.attributes.position.needsUpdate = true;
      points.rotation.y += 0.002;
      renderer.render(scene, cameraView);
    }
    animate();
  </script>
</body>
</html>
