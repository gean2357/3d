<!DOCTYPE html>
<html>
<head>
  <title>Júpiter Interativo - Dennis Pro</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
    
    /* Container da Webcam no canto */
    #camera-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 240px;
      height: 180px;
      border: 2px solid #00ffff;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
      background: #000;
    }

    #webcam {
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      object-fit: cover;
    }

    /* Canvas para as linhas da mão sobre a webcam */
    #hand-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 11;
      transform: scaleX(-1);
    }

    #info {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #00ffff;
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00ffff;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">MÃO FECHADA: FORMA PERFEITA | MÃO ABERTA: ESPALHAR LUZ</div>
  
  <div id="camera-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="hand-canvas"></canvas>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    // --- CONFIGURAÇÃO DO JÚPITER (THREE.JS) ---
    const scene = new THREE.Scene();
    const cameraView = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const particlesGeometry = new THREE.BufferGeometry();
    const count = 12000; // Aumentei para ficar mais bonito
    const positions = new Float32Array(count * 3);
    const originalPositions = new Float32Array(count * 3);

    for(let i = 0; i < count * 3; i+=3) {
        let phi = Math.acos(-1 + (2 * i/3) / count);
        let theta = Math.sqrt(count * Math.PI) * phi;
        let r = 2.5;
        positions[i] = r * Math.cos(theta) * Math.sin(phi);
        positions[i+1] = r * Math.sin(theta) * Math.sin(phi);
        positions[i+2] = r * Math.cos(phi);
        originalPositions[i] = positions[i];
        originalPositions[i+1] = positions[i+1];
        originalPositions[i+2] = positions[i+2];
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ size: 0.012, color: 0xffcc88, transparent: true, opacity: 0.8 });
    const points = new THREE.Points(particlesGeometry, material);
    scene.add(points);
    cameraView.position.z = 6;

    // --- CONFIGURAÇÃO DA WEBCAM E HANDS ---
    const videoElement = document.getElementById('webcam');
    const handCanvas = document.getElementById('hand-canvas');
    const handCtx = handCanvas.getContext('2d');
    let explosionFactor = 0;

    function onResults(results) {
      // Ajusta o canvas da mão ao tamanho do vídeo
      handCanvas.width = videoElement.videoWidth;
      handCanvas.height = videoElement.videoHeight;
      handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const landmarks of results.multiHandLandmarks) {
          // DESENHA AS LINHAS NA MINI WEBCAM
          drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
          drawLandmarks(handCtx, landmarks, {color: '#00ffff', lineWidth: 1, radius: 2});

          // LÓGICA DE JÚPITER (Mão aberta vs fechada)
          const thumbTip = landmarks[4];
          const indexTip = landmarks[8];
          const distance = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));
          
          // Se a distância for grande (mão aberta), explode. Se for pequena (fechada), forma perfeita.
          explosionFactor = distance > 0.12 ? (distance * 8) : 0;
        }
      } else {
        explosionFactor = 0;
      }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await hands.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();

    // --- LOOP DE ANIMAÇÃO ---
    function animate() {
      requestAnimationFrame(animate);
      const posArr = particlesGeometry.attributes.position.array;
      
      for(let i = 0; i < count * 3; i+=3) {
        const ox = originalPositions[i];
        const oy = originalPositions[i+1];
        const oz = originalPositions[i+2];
        
        // Suavização do movimento das partículas
        let targetX = ox * (1 + explosionFactor);
        let targetY = oy * (1 + explosionFactor);
        let targetZ = oz * (1 + explosionFactor);

        posArr[i] += (targetX - posArr[i]) * 0.1;
        posArr[i+1] += (targetY - posArr[i+1]) * 0.1;
        posArr[i+2] += (targetZ - posArr[i+2]) * 0.1;
      }
      
      particlesGeometry.attributes.position.needsUpdate = true;
      points.rotation.y += 0.003;
      renderer.render(scene, cameraView);
    }

    window.addEventListener('resize', () => {
      cameraView.aspect = window.innerWidth / window.innerHeight;
      cameraView.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
